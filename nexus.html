<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO | Estudo de E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nexo: {
                            dark: '#0f172a',
                            light: '#e2e8f0',
                            accent: '#38bdf8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Animação suave para o painel do carrinho */
        #cart-panel {
            transition: transform 0.3s ease-in-out;
        }
        .cart-open {
            transform: translateX(0);
        }
        .cart-closed {
            transform: translateX(100%);
        }
    </style>
</head>
<body class="bg-nexo-dark text-nexo-light font-sans antialiased overflow-x-hidden relative">

    <header class="fixed w-full top-0 z-40 bg-nexo-dark/90 backdrop-blur-md border-b border-slate-800">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-nexo-accent to-purple-500">
                NEXO.
            </a>
            <div class="flex items-center space-x-4">
                <button onclick="toggleCart()" class="hover:text-nexo-accent transition-colors relative">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span id="cart-count" class="absolute -top-1 -right-2 bg-purple-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="pt-28 pb-16">
        <section class="container mx-auto px-6 text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4">A Tecnologia do Futuro, <span class="text-nexo-accent">Hoje.</span></h1>
            <p class="text-slate-400">Adicione produtos ao carrinho para testar a lógica JavaScript.</p>
        </section>

        <section class="container mx-auto px-6">
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </section>
    </main>

    <div id="cart-panel" class="fixed top-0 right-0 h-full w-full md:w-96 bg-slate-900 border-l border-slate-700 z-50 cart-closed flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h2 class="text-2xl font-bold">Seu Carrinho</h2>
            <button onclick="toggleCart()" class="text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
            <p class="text-slate-500 text-center mt-10">O carrinho está vazio.</p>
        </div>

        <div class="p-6 border-t border-slate-700 bg-slate-800">
            <div class="flex justify-between items-center mb-4">
                <span class="text-lg text-slate-300">Total:</span>
                <span id="cart-total" class="text-2xl font-bold text-nexo-accent">R$ 0,00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-gradient-to-r from-nexo-accent to-purple-600 text-white font-bold py-3 rounded-lg hover:opacity-90 transition-opacity">
                Finalizar Compra
            </button>
        </div>
    </div>

    <script>
        // 1. DADOS: Simulação de um Banco de Dados
        const products = [
            { id: 1, name: "Aura Headset Pro", price: 1299.00, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80" },
            { id: 2, name: "Nexo Core Keyboard", price: 849.50, image: "https://images.unsplash.com/photo-1593640408182-31c70c8268f5?w=500&q=80" },
            { id: 3, name: "Lúmen Smartwatch", price: 1700.00, image: "https://images.unsplash.com/photo-1523206489230-c012c64b2b48?w=500&q=80" }
        ];

        // 2. ESTADO: Variável que guarda os itens do carrinho
        let cart = [];

        // 3. FUNÇÃO: Renderizar os produtos na tela
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; // Limpa o grid

            products.forEach(product => {
                // Cria o HTML de cada produto dinamicamente
                const card = `
                    <article class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-48 object-cover">
                        <div class="p-6">
                            <h3 class="text-xl font-bold mb-4">${product.name}</h3>
                            <div class="flex justify-between items-center">
                                <span class="text-xl text-white">R$ ${product.price.toFixed(2).replace('.', ',')}</span>
                                <button onclick="addToCart(${product.id})" class="bg-nexo-accent text-white px-4 py-2 rounded hover:bg-sky-500 transition">
                                    Adicionar
                                </button>
                            </div>
                        </div>
                    </article>
                `;
                grid.innerHTML += card;
            });
        }

        // 4. FUNÇÃO: Adicionar item ao carrinho
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            
            // Verifica se o item já está no carrinho
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1; // Aumenta a quantidade
            } else {
                cart.push({ ...product, quantity: 1 }); // Adiciona novo item com qtd 1
            }
            
            updateCartUI();
            
            // Abre o carrinho automaticamente para mostrar o feedback ao usuário
            const panel = document.getElementById('cart-panel');
            if (panel.classList.contains('cart-closed')) {
                toggleCart();
            }
        }

        // 5. FUNÇÃO: Remover item do carrinho
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        // 6. FUNÇÃO: Atualizar a Interface do Carrinho (HTML e Valores)
        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');

            // Atualiza o contador bolinha no menu
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.innerText = totalItems;

            // Se o carrinho estiver vazio
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-slate-500 text-center mt-10">O carrinho está vazio.</p>';
                cartTotal.innerText = 'R$ 0,00';
                return;
            }

            // Renderiza os itens dentro do painel
            cartItemsContainer.innerHTML = '';
            let totalValue = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                totalValue += itemTotal;

                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
                        <div>
                            <h4 class="font-bold text-sm">${item.name}</h4>
                            <p class="text-slate-400 text-xs">${item.quantity}x R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-500 text-sm font-bold">
                            Remover
                        </button>
                    </div>
                `;
            });

            // Atualiza o valor total
            cartTotal.innerText = `R$ ${totalValue.toFixed(2).replace('.', ',')}`;
        }

        // 7. FUNÇÃO: Abrir e Fechar o Painel Lateral
        function toggleCart() {
            const panel = document.getElementById('cart-panel');
            if (panel.classList.contains('cart-closed')) {
                panel.classList.remove('cart-closed');
                panel.classList.add('cart-open');
            } else {
                panel.classList.remove('cart-open');
                panel.classList.add('cart-closed');
            }
        }

        // 8. FUNÇÃO: Simular a finalização
        function checkout() {
            if (cart.length === 0) {
                alert("Adicione itens ao carrinho primeiro!");
                return;
            }
            alert("Compra finalizada com sucesso! Este é o fim do protótipo.");
            cart = []; // Limpa o carrinho
            updateCartUI();
            toggleCart(); // Fecha o painel
        }

        // Inicializa a loja renderizando os produtos ao carregar a página
        renderProducts();
    </script>
</body>
</html>
